name: Mailcart
options:
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.local.outlookmailapp
    SWIFT_OBJC_BRIDGING_HEADER: OutlookMail-Bridging-Header.h
    CLANG_CXX_LANGUAGE_STANDARD: c++17
    HEADER_SEARCH_PATHS:
      - $(SRCROOT)/../cpp_core/include
    INFOPLIST_FILE: $(SRCROOT)/Info.plist
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO
    ENABLE_PREVIEWS: NO
packages:
  plcrashreporter:
    url: https://github.com/microsoft/plcrashreporter.git
    from: 1.12.0
targets:
  Mailcart:
    type: application
    platform: macOS
    dependencies:
      - package: plcrashreporter
        product: CrashReporter
    sources:
      - path: UI
      - path: Bridge
      - path: ../cpp_core
        includes:
          - src/mailcart.cpp
          - include/mailcart.hpp
          - src/mime_content.cpp
          - include/mime_content.hpp
          - src/outlook_mailcart.cpp
          - include/outlook_mailcart.hpp
          - src/outlook_client.cpp
          - include/outlook_client.hpp
  MailcartTests:
    type: bundle.unit-test
    platform: macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.outlookmailapp.MailcartTests
        INFOPLIST_FILE: Tests/MailcartTests-Info.plist
        TEST_HOST: ""
        BUNDLE_LOADER: ""
        SWIFT_OBJC_BRIDGING_HEADER: ""
    sources:
      - path: Tests
      - path: UI/MailcartLaunchMode.swift
  MailcartUITests:
    type: bundle.ui-testing
    platform: macOS
    dependencies:
      - target: Mailcart
    sources:
      - path: UITests
