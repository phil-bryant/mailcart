rules:
  - id: no-hardcoded-graph-bearer-token
    message: Hardcoded Graph bearer tokens should not be committed.
    severity: ERROR
    languages:
      - generic
    paths:
      exclude:
        - tests/
        - requirements/
        - .build/
        - .cursor/
        - "**/macos_app/OutlookMailApp.xcodeproj/"
    pattern-regex: '(?i)(OUTLOOK_GRAPH_TOKEN|Authorization:\s*Bearer)\s*[:=]\s*["''][A-Za-z0-9._\-]{24,}["'']'

  - id: no-production-http-endpoint
    message: Avoid plain HTTP endpoints outside of local development.
    severity: WARNING
    languages:
      - generic
    paths:
      exclude:
        - tests/
        - requirements/
        - .build/
        - .cursor/
        - .semgrep.yml
        - "*.plist"
    patterns:
      - pattern-regex: '(?i)http://[A-Za-z0-9._:-]+'
      - pattern-not-regex: '(?i)http://www\.apple\.com/DTDs/'
