# =============================================================================
# CI POLICY: INTENTIONALLY DISABLED FOR AUTO-RUNS (pre-release, solo dev).
#
# This workflow is manual-dispatch-only (`on: workflow_dispatch`). It does NOT
# run on push, pull_request, or schedule. That is deliberate: until the project
# approaches ~v1.0, the enforcement mechanism is the LOCAL numbered test lanes
# (`./0N_*.sh` + `tests/tNN_*.sh`), not GitHub-hosted CI. The workflow is kept
# present, correct, and manually runnable so it can simply be wired to
# push/pull_request as we approach v1.0. Until then, nothing here auto-runs.
#
# See the "Pre-release CI/CD Policy" section in this repo's README.md.
#
# SCOPE (honest): mailcart is primarily a native macOS Swift app with an
# ObjC++/C++ Outlook-Graph bridge; most of its lanes need Xcode/Swift/macOS and
# CANNOT run on a Linux runner. This workflow runs ONLY the Linux-portable
# Python subset and delegates to mailcart's numbered lane pointers (which exec
# the shared `runner` goldens):
#   - t00 code quality (Python lane; SwiftPM periphery/lizard are disabled for
#     mailcart because its Swift app is an Xcode project, not a SwiftPM package)
#   - t06 Python unit tests (the Matchy-API adapter surface)
#   - t04 requirements traceability
# Intentionally EXCLUDED here (stay local honor-system): t01 AV, t02 dependency
# freshness, t03 SAST, t05 shell/bats, t07 mutation, t08 C++ integration,
# t09 Swift build, t10 fuzz, t11 DAST, t12 macOS UI regression, t13 crash,
# t14 FileVault.
# NOTE: t05 shell/bats is excluded until the hardcoded `/Users/phil/...` paths in
# the Bats files are made portable (remediation plan Item 3); add it here once
# those derive REPO_ROOT dynamically. mailcart's lane pointers require the
# sibling `runner` repo, so it is checked out next to mailcart below.
# =============================================================================
name: CI (manual, disabled pre-release) — mailcart

on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-subset:
    name: mailcart Linux subset (t00/t06/t04)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: "true"

    steps:
      - name: Checkout mailcart
        uses: actions/checkout@v4
        with:
          path: mailcart

      # mailcart's tNN_*.sh / 0N_*.sh are thin pointers that exec the shared
      # `runner` goldens (RUNNER_HOME=../runner). Check runner out as a sibling.
      # Adjust `repository` if the runner repo lives under a different owner/name.
      - name: Checkout sibling runner
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/runner
          path: runner

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux test tools
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck

      - name: Create venv and load requirements
        working-directory: mailcart
        run: |
          ./02_create_venv.sh
          source ./mailcart-venv/bin/activate
          ./04_load_requirements.sh

      - name: Code quality (t00, Python lane)
        working-directory: mailcart
        run: |
          source ./mailcart-venv/bin/activate
          ./tests/t00_run_code_quality_tests.sh

      - name: Python unit tests (t06)
        working-directory: mailcart
        run: |
          source ./mailcart-venv/bin/activate
          ./tests/t06_run_python_unit_tests.sh

      - name: Requirements traceability (t04)
        working-directory: mailcart
        run: |
          source ./mailcart-venv/bin/activate
          ./tests/t04_run_requirements_traceability_tests.sh
